[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  included_files = ["netlify/functions/practitioners-data.json"]

[functions."match-intake"]
  timeout = 30

[context.production.environment]
  REACT_APP_TASKLET_WEBHOOK_URL = "${TASKLET_WEBHOOK_URL}"
